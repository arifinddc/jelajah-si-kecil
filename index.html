<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademi Penyihir - AI Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap');

        :root {
            --bg: #1a0633;
            --accent: #ffd700;
            --btn-primary: #ff5e00;
            --btn-sec: #8e44ad;
        }

        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between;
            padding: 15px 20px; flex-shrink: 0;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 8px 18px; border-radius: 25px;
            font-size: 20px; font-weight: 800;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .game-main {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px; gap: 20px;
        }

        .question-box {
            width: 100%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 3px dashed var(--accent);
            border-radius: 25px; padding: 15px; text-align: center;
        }

        .equation { font-size: clamp(32px, 8vw, 45px); font-weight: 800; }

        #canvas-container {
            position: relative;
            width: 85vw; height: 85vw;
            max-width: 350px; max-height: 350px;
            background: white; border: 8px solid #b388ff;
            border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        canvas { width: 100%; height: 100%; border-radius: 27px; }

        .controls {
            padding: 20px; display: flex; gap: 15px;
            width: 100%; max-width: 500px; margin: 0 auto; flex-shrink: 0;
        }

        button {
            flex: 1; font-family: inherit; font-weight: 800;
            font-size: 20px; border: none; border-radius: 25px;
            padding: 18px; cursor: pointer; color: white;
            transition: transform 0.1s, filter 0.2s;
        }

        .btn-clear { background: var(--btn-sec); box-shadow: 0 6px 0 #5e3370; }
        .btn-magic { background: var(--btn-primary); box-shadow: 0 6px 0 #b34200; }
        button:active { transform: translateY(4px); box-shadow: none; }

        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: var(--accent); margin-bottom: 10px;">Mempersiapkan Sihir AI...</h2>
        <div class="stat" id="load-status">Menghubungkan ke Awan ✨</div>
    </div>

    <div class="header">
        <div class="stat">❤️ <span id="hearts">5</span></div>
        <div class="stat">⭐ <span id="points">0</span></div>
    </div>

    <div class="game-main">
        <div class="question-box">
            <div style="font-size: 16px; color: var(--accent); margin-bottom: 5px;">Berapa hasil ramuan ini?</div>
            <div class="equation" id="quest">🍄 + 🍄 = ?</div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearBoard()">Hapus</button>
        <button class="btn-magic" onclick="recognizeDigit()">Mantra! ✨</button>
    </div>

    <script>
        let model;
        let isAiReady = false;
        let points = 0;
        let hearts = 5;
        let targetNum = 2;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let drawing = false;

        async function init() {
            initCanvasSize();
            try {
                // Tunggu AI memuat. Tidak ada paksaan mulai (fallback) jika gagal.
                model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_v1/model.json');
                isAiReady = true;
                document.getElementById('load-status').innerText = "Sihir Siap! 🪄";
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 500);
            } catch (e) {
                console.error("AI Error:", e);
                // Jika gagal, layar terkunci meminta refresh agar anak tidak bermain tanpa penilaian
                document.getElementById('load-status').innerText = "Koneksi Terputus. Mohon Refresh Halaman! 📡";
            }
            generateQuestion();
        }

        function initCanvasSize() {
            const size = 300; 
            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 20;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        }

        function generateQuestion() {
            const n1 = Math.floor(Math.random() * 4) + 1;
            const n2 = Math.floor(Math.random() * 4) + 1;
            targetNum = n1 + n2;
            const icons = ['🍄', '🍃', '🔮', '⭐', '🍎'];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            document.getElementById('quest').innerHTML = `${icon.repeat(n1)} + ${icon.repeat(n2)} = ?`;
            clearBoard();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function move(e) { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function end() { drawing = false; }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
        canvas.addEventListener('touchend', end);

        function clearBoard() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // --- AI RECOGNITION TINGKAT TINGGI (DENGAN AUTO-CROP) ---
        async function recognizeDigit() {
            if (!isAiReady) {
                alert("Sihir AI belum siap! Coba refresh halamannya ya.");
                return;
            }

            // 1. Ambil data piksel dan cari Bounding Box (Batas Coretan Anak)
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imgData.data;
            let hasContent = false;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if (pixels[i] < 200) { // Jika piksel berwarna gelap
                        hasContent = true;
                        if (x < minX) minX = x;
                        if (y < minY) minY = y;
                        if (x > maxX) maxX = x;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            if (!hasContent) {
                alert("Tulis angka jawabannya dulu ya!");
                return;
            }

            // 2. Pre-processing: Potong dan Pusatkan Coretan ke tengah Kanvas Mini 28x28
            const width = maxX - minX;
            const height = maxY - minY;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = "white";
            tCtx.fillRect(0, 0, 28, 28);
            
            // Atur agar besaran coretan maksimal 20 piksel (menyisakan margin 4 piksel untuk AI)
            const scale = Math.min(20 / Math.max(width, 1), 20 / Math.max(height, 1));
            const newW = width * scale;
            const newH = height * scale;
            const dx = (28 - newW) / 2;
            const dy = (28 - newH) / 2;
            
            tCtx.drawImage(canvas, minX, minY, width, height, dx, dy, newW, newH);

            // 3. Eksekusi Prediksi AI dari kanvas yang sudah disempurnakan
            const prediction = tf.tidy(() => {
                let tensor = tf.browser.fromPixels(tempCanvas, 1).toFloat();
                tensor = tf.scalar(255.0).sub(tensor).div(tf.scalar(255.0)); // Inversi: latar jadi hitam, tulisan jadi putih
                return model.predict(tensor.expandDims(0));
            });

            const data = await prediction.data();
            const finalGuess = data.indexOf(Math.max(...data));
            
            processResult(finalGuess);
        }

        function processResult(guess) {
            // Sekarang logika perbandingan ini murni hasil tebakan AI melawan kunci jawaban
            if (guess === targetNum) {
                points += 10;
                document.getElementById('points').innerText = points;
                alert("WAAAH HEBAT! ✨ Itu benar angka " + guess + "!");
                generateQuestion();
            } else {
                hearts--;
                document.getElementById('hearts').innerText = hearts;
                document.getElementById('canvas-container').classList.add('shake');
                setTimeout(() => document.getElementById('canvas-container').classList.remove('shake'), 400);
                
                if (hearts <= 0) {
                    alert("Energi sihir habis! Ayo coba lagi dari awal.");
                    points = 0; hearts = 5;
                    document.getElementById('points').innerText = points;
                    document.getElementById('hearts').innerText = hearts;
                    generateQuestion();
                } else {
                    alert("Hmm, sepertinya itu angka " + guess + " ya? Coba tulis angka " + targetNum + " dengan lebih jelas!");
                    clearBoard();
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
