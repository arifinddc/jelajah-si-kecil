<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademi Penyihir Cilik - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap');

        :root {
            --primary-bg: #2c003e;
            --accent-color: #ffd700;
            --magic-pink: #ff1493;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--primary-bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Header Stats: Hearts & Points */
        .stats-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: 800;
            z-index: 10;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .heart { color: #ff4757; font-size: 24px; }
        .coin { color: var(--accent-color); font-size: 24px; }

        /* Game Area */
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px;
            box-sizing: border-box;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.15);
            border: 3px dashed var(--accent-color);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .equation {
            font-size: clamp(30px, 8vw, 45px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Canvas Stylings */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 40vh;
            background: white;
            border: 8px solid #8a2be2;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            cursor: crosshair;
        }

        .canvas-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ddd;
            font-size: 24px;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Buttons */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            font-family: inherit;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        .btn-main {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: white;
            padding: 15px 30px;
            font-size: 22px;
            box-shadow: 0 5px 0 #cc3700;
            width: 100%;
        }

        .btn-sec {
            background: #9370db;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            box-shadow: 0 5px 0 #6a5acd;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake { animation: shake 0.4s ease-in-out; }

        .celebrate {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        /* Shop Modal */
        #shop-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #4b0082;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="heart">❤️</span> <span id="heart-count">5</span>
        </div>
        <div class="stat-item" onclick="openShop()" style="cursor: pointer;">
            <span class="coin">⭐</span> <span id="point-count">0</span>
        </div>
    </div>

    <div id="game-container">
        <div class="question-card">
            <div id="question-text" style="margin-bottom: 5px; color: var(--accent-color);">Berapa hasil ramuan ini?</div>
            <div class="equation" id="equation-display">
                </div>
        </div>

        <div id="canvas-wrapper">
            <div class="canvas-hint" id="hint-text">Tulis Angkanya</div>
            <canvas id="drawingCanvas"></canvas>
        </div>

        <div class="action-area">
            <div class="btn-group">
                <button class="btn-sec" onclick="clearCanvas()">Hapus</button>
                <button class="btn-main" onclick="checkAnswer()">Rapalkan Mantra! ✨</button>
            </div>
        </div>
    </div>

    <div class="celebrate" id="win-anim">✨🏆✨</div>

    <div id="shop-modal">
        <div class="modal-content">
            <h2>Butuh Hati Baru?</h2>
            <p>Tukar 10 Bintang ⭐ untuk 1 Hati ❤️</p>
            <button class="btn-main" onclick="buyHeart()">Tukar Sekarang!</button>
            <button class="btn-sec" onclick="closeShop()" style="margin-top:10px;">Nanti Saja</button>
        </div>
    </div>

    <script>
        let hearts = 5;
        let points = 0;
        let currentAnswer = 0;

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Setup Canvas
        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.strokeStyle = "#ff1493";
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
        }

        window.addEventListener('load', () => {
            initCanvas();
            newLevel();
        });

        // Drawing Logic
        function startDrawing(e) {
            drawing = true;
            document.getElementById('hint-text').style.display = 'none';
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() { drawing = false; }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stopDrawing);

        // Game Logic
        function newLevel() {
            const num1 = Math.floor(Math.random() * 3) + 1;
            const num2 = Math.floor(Math.random() * 3) + 1;
            currentAnswer = num1 + num2;

            const icons = ['🍄', '🍃', '🔮', '⭐', '🧪'];
            const icon = icons[Math.floor(Math.random() * icons.length)];

            document.getElementById('equation-display').innerHTML = `
                <span>${icon.repeat(num1)}</span>
                <span style="color:var(--accent-color)">+</span>
                <span>${icon.repeat(num2)}</span>
                <span style="color:var(--accent-color)">=</span>
                <span>?</span>
            `;
            clearCanvas();
        }

        function checkAnswer() {
            // Karena ini purwarupa tanpa AI OCR, kita simulasikan: 
            // Setiap kali anak menulis (kanvas tidak kosong), kita anggap benar untuk menjaga semangat.
            // Di produksi nyata, kita gunakan library seperti Tesseract.js atau TensorFlow.js
            
            const isCanvasEmpty = ctx.getImageData(0,0,canvas.width,canvas.height).data.every(p => p === 0);

            if (isCanvasEmpty) {
                alert("Tulis jawabanmu dulu di papan ajaib!");
                return;
            }

            // Simulasi deteksi sederhana (90% kemungkinan benar untuk prototype)
            const isCorrect = Math.random() > 0.1; 

            if (isCorrect) {
                points += 5;
                updateStats();
                showSuccess();
            } else {
                hearts--;
                updateStats();
                showFailure();
            }
        }

        function showSuccess() {
            const anim = document.getElementById('win-anim');
            anim.style.display = 'block';
            setTimeout(() => {
                anim.style.display = 'none';
                newLevel();
            }, 1500);
        }

        function showFailure() {
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.classList.add('shake');
            setTimeout(() => wrapper.classList.remove('shake'), 400);
            
            if (hearts <= 0) {
                alert("Hati habis! Yuk tukar bintangmu.");
                openShop();
            }
        }

        function updateStats() {
            document.getElementById('point-count').innerText = points;
            document.getElementById('heart-count').innerText = hearts;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('hint-text').style.display = 'block';
        }

        // Shop Logic
        function openShop() { document.getElementById('shop-modal').style.display = 'flex'; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }
        
        function buyHeart() {
            if (points >= 10) {
                points -= 10;
                hearts++;
                updateStats();
                closeShop();
            } else {
                alert("Bintangmu belum cukup, ayo main lagi!");
            }
        }
    </script>
</body>
</html>
