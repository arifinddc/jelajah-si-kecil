<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademi Penyihir - AI Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap');

        :root {
            --bg: #1a0633;
            --accent: #ffd700;
            --btn-primary: #ff5e00;
            --btn-sec: #8e44ad;
        }

        * { touch-action: none; box-sizing: border-box; }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; /* Dynamic height agar tidak kepotong */
            overflow: hidden; /* Anti scroll */
            display: flex;
            flex-direction: column;
        }

        /* Header Stats */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            flex-shrink: 0;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Game Area */
        .game-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 15px;
        }

        .question-box {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.1);
            border: 2px dashed var(--accent);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
        }

        .equation {
            font-size: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Canvas Area */
        #canvas-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 320px;
            max-height: 320px;
            background: white;
            border: 6px solid #b388ff;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }

        /* Bottom Controls - Fixed at Bottom */
        .controls {
            padding: 20px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            flex-shrink: 0;
        }

        button {
            flex: 1;
            font-family: inherit;
            font-weight: 800;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
        }

        .btn-clear { background: var(--btn-sec); box-shadow: 0 5px 0 #5e3370; }
        .btn-magic { background: var(--btn-primary); box-shadow: 0 5px 0 #b34200; }
        
        button:active { transform: translateY(5px); box-shadow: none; }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: var(--accent);">Mempersiapkan Sihir AI...</h2>
        <div class="stat">Mohon Tunggu ✨</div>
    </div>

    <div class="header">
        <div class="stat">❤️ <span id="hearts">5</span></div>
        <div class="stat" id="shop-trigger">⭐ <span id="points">0</span></div>
    </div>

    <div class="game-main">
        <div class="question-box">
            <div style="font-size: 14px; color: var(--accent);">Berapa hasil ramuan ini?</div>
            <div class="equation" id="quest">
                🍄 + 🍄🍄 = ?
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearBoard()">Hapus</button>
        <button class="btn-magic" onclick="recognizeDigit()">Rapalkan Mantra! ✨</button>
    </div>

    <script>
        let model;
        let points = 0;
        let hearts = 5;
        let targetNum = 3;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let drawing = false;

        // Load TensorFlow Model (MNIST pre-trained)
        async function loadModel() {
            try {
                // Menggunakan model MNIST yang di-host secara publik
                model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_v1/model.json');
                document.getElementById('loader').style.display = 'none';
                initGame();
            } catch (e) {
                console.error("Gagal load AI", e);
                alert("Koneksi internet diperlukan untuk memanggil sihir AI!");
            }
        }

        function initGame() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = 280; // Resolusi internal untuk AI
            canvas.height = 280;
            ctx.strokeStyle = "black"; // AI dilatih dengan background putih, tulisan hitam/gelap
            ctx.lineWidth = 18;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            generateQuestion();
        }

        function generateQuestion() {
            const n1 = Math.floor(Math.random() * 4) + 1;
            const n2 = Math.floor(Math.random() * 4) + 1;
            targetNum = n1 + n2;
            const icons = ['🍄', '🍃', '🔮', '⭐'];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            document.getElementById('quest').innerHTML = `${icon.repeat(n1)} + ${icon.repeat(n2)} = ?`;
            clearBoard();
        }

        // Drawing Logic
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function move(e) { 
            if(!drawing) return; 
            const p = getPos(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
        }
        function end() { drawing = false; }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
        canvas.addEventListener('touchend', end);

        function clearBoard() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // AI RECOGNITION PROCESS
        async function recognizeDigit() {
            // 1. Ambil data gambar dari kanvas
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 2. Pre-processing untuk TensorFlow (28x28 grayscale)
            const prediction = tf.tidy(() => {
                let tensor = tf.browser.fromPixels(imgData, 1) // Ambil 1 channel (grayscale)
                    .resizeNearestNeighbor([28, 28]) // Ubah ke 28x28
                    .mean(2) // Pastikan grayscale
                    .expandDims(2)
                    .expandDims(0)
                    .toFloat();
                
                // Invert warna (karena MNIST dilatih dengan latar belakang hitam, tulisan putih)
                // Di kanvas kita: latar putih (255), tulisan hitam (0)
                tensor = tf.scalar(255.0).sub(tensor).div(tf.scalar(255.0));
                
                return model.predict(tensor);
            });

            const result = await prediction.data();
            const predictedDigit = result.indexOf(Math.max(...result));
            
            checkLogic(predictedDigit);
        }

        function checkLogic(guess) {
            if (guess === targetNum) {
                points += 10;
                document.getElementById('points').innerText = points;
                alert("HEBAT! Mantramu benar, itu angka " + guess + "! ✨");
                generateQuestion();
            } else {
                hearts--;
                document.getElementById('hearts').innerText = hearts;
                document.getElementById('canvas-container').classList.add('shake');
                setTimeout(() => document.getElementById('canvas-container').classList.remove('shake'), 400);
                
                if (hearts <= 0) {
                    if (points >= 20) {
                        if(confirm("Hati habis! Tukar 20 Bintang untuk 3 Hati?")) {
                            points -= 20; hearts = 3;
                            document.getElementById('points').innerText = points;
                            document.getElementById('hearts').innerText = hearts;
                        } else { resetGame(); }
                    } else {
                        alert("Yah, energi sihirmu habis. Ayo mulai lagi!");
                        resetGame();
                    }
                } else {
                    alert("Ayo coba lagi, sepertinya mantramu kurang tepat!");
                }
            }
        }

        function resetGame() {
            points = 0; hearts = 5;
            document.getElementById('points').innerText = points;
            document.getElementById('hearts').innerText = hearts;
            generateQuestion();
        }

        loadModel();
    </script>
</body>
</html>
