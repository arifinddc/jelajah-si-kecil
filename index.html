<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademi Penyihir Cilik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap');

        body {
            font-family: 'Baloo 2', cursive, sans-serif;
            background-color: #2c003e; /* Warna malam ajaib */
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none; /* Penting untuk interaksi sentuh murni di kanvas */
        }

        #game-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            font-size: 28px;
        }

        p.subtitle {
            margin-top: 0;
            font-size: 16px;
            color: #d8bfd8;
        }

        .question-area {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 20px;
            border: 2px dashed #ffd700;
        }

        .equation {
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .emoji-group {
            display: flex;
            gap: 5px;
            font-size: 45px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            background: #fff;
            border: 6px solid #8a2be2;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Label instruksi samar di latar belakang kanvas */
        #canvas-container::before {
            content: "Tulis di sini...";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-size: 30px;
            pointer-events: none;
            z-index: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 300px;
            cursor: crosshair;
            position: relative;
            z-index: 1;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            border: none;
            padding: 15px 25px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-weight: 800;
        }

        .btn-magic {
            background: #ff4500;
            color: white;
            box-shadow: 0 6px 0 #cc3700;
        }

        .btn-clear {
            background: #9370db;
            color: white;
            box-shadow: 0 6px 0 #6a5acd;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        #feedback {
            font-size: 26px;
            font-weight: 800;
            margin-top: 20px;
            min-height: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .try-again { color: #ffa500; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Akademi Penyihir Cilik</h1>
        <p class="subtitle">Bantu racik ramuan dengan menulis angkanya!</p>

        <div class="question-area">
            <div class="equation">
                <div class="emoji-group">🍄</div>
                <div style="color: #ffd700;">+</div>
                <div class="emoji-group">🍃🍃</div>
                <div style="color: #ffd700;">=</div>
                <div style="font-size: 50px; color: #fff;">?</div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="magicBoard"></canvas>
        </div>

        <div class="controls">
            <button class="btn-clear" onclick="clearCanvas()">Hapus</button>
            <button class="btn-magic" onclick="castSpell()">Rapalkan Mantra! ✨</button>
        </div>

        <div id="feedback"></div>
    </div>

    <script>
        const canvas = document.getElementById('magicBoard');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let strokeCount = 0; // Menghitung seberapa banyak anak mencoret

        // Menyesuaikan ukuran kanvas internal dengan ukuran tampilan CSS
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 15; // Garis tebal agar mudah dilihat anak
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Mengatur gaya tinta ajaib (warna gradasi/neon)
        ctx.strokeStyle = '#ff1493'; 

        // Mouse Events (Untuk tes di Laptop)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch Events (Untuk HP/Tablet)
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            strokeCount++;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function handleTouchStart(e) {
            e.preventDefault(); // Mencegah scrolling layar
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            isDrawing = true;
            strokeCount++;
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            strokeCount = 0;
            const feedback = document.getElementById('feedback');
            feedback.style.opacity = '0';
        }

        // Logika Pemeriksaan (Simulasi)
        function castSpell() {
            const feedback = document.getElementById('feedback');
            feedback.style.opacity = '1';

            // Cek apakah kanvas kosong
            if (strokeCount === 0) {
                feedback.className = 'try-again';
                feedback.innerHTML = "Kuali masih kosong. Tulis angka 3 ya!";
                return;
            }

            // Simulasi apresiasi jika anak sudah mencoret sesuatu
            feedback.className = 'success';
            feedback.innerHTML = "BUM! 🌟 Ramuan Berhasil!";
            
            // Efek tambahan: mengganti warna tinta secara acak setelah berhasil
            const colors = ['#ff1493', '#00ffff', '#32cd32', '#ffd700'];
            ctx.strokeStyle = colors[Math.floor(Math.random() * colors.length)];
            
            // Opsional: Lanjut ke level berikutnya setelah beberapa detik
            setTimeout(() => {
                clearCanvas();
                feedback.style.opacity = '0';
                // Di sini nanti logika untuk mengganti soal ke 2 apel + 2 apel
            }, 3000);
        }
    </script>
</body>
</html>
