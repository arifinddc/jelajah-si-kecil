<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Akademi Penyihir - V3 (Anti Cheat)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap');

        :root {
            --bg: #1a0633;
            --accent: #ffd700;
            --btn-primary: #00b894; /* Warna tombol baru agar terlihat bedanya */
            --btn-sec: #d63031;
        }

        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between;
            padding: 15px 15px; flex-shrink: 0; align-items: center;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 20px;
            font-size: 18px; font-weight: 800;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .ai-eye-container {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px; border-radius: 15px; border: 1px dashed var(--accent);
        }

        .ai-eye-container span { font-size: 10px; color: var(--accent); margin-bottom: 2px; }

        .game-main {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 5px; gap: 15px;
        }

        .question-box {
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 3px dashed var(--accent);
            border-radius: 25px; padding: 10px; text-align: center;
        }

        .equation { font-size: clamp(30px, 8vw, 45px); font-weight: 800; }

        #canvas-container {
            position: relative;
            width: 85vw; height: 85vw;
            max-width: 320px; max-height: 320px;
            background: white; border: 8px solid #b388ff;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        canvas.main-board { width: 100%; height: 100%; border-radius: 22px; cursor: crosshair; }

        .controls {
            padding: 15px; display: flex; gap: 15px;
            width: 100%; max-width: 500px; margin: 0 auto; flex-shrink: 0;
        }

        button {
            flex: 1; font-family: inherit; font-weight: 800;
            font-size: 20px; border: none; border-radius: 20px;
            padding: 15px; cursor: pointer; color: white;
            transition: transform 0.1s;
        }

        .btn-clear { background: var(--btn-sec); box-shadow: 0 6px 0 #a02020; }
        .btn-magic { background: var(--btn-primary); box-shadow: 0 6px 0 #008a6e; }
        button:active { transform: translateY(4px); box-shadow: none; }

        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: var(--accent); margin-bottom: 10px;">Mempersiapkan Sihir AI...</h2>
        <div class="stat" id="load-status">Menghubungkan ke Awan ✨</div>
    </div>

    <div class="header">
        <div class="stat">❤️ <span id="hearts">5</span></div>
        
        <div class="ai-eye-container">
            <span>Mata AI</span>
            <canvas id="ai-eye" width="28" height="28" style="background: white; width: 28px; height: 28px; border-radius: 4px; border: 1px solid #333;"></canvas>
        </div>

        <div class="stat">⭐ <span id="points">0</span></div>
    </div>

    <div class="game-main">
        <div class="question-box">
            <div style="font-size: 14px; color: var(--accent); margin-bottom: 5px;">Berapa hasil ramuan ini?</div>
            <div class="equation" id="quest">🍄 + 🍄 = ?</div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas" class="main-board"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearBoard()">Hapus</button>
        <button class="btn-magic" onclick="recognizeDigit()">Mantra! ✨</button>
    </div>

    <script>
        let model;
        let isAiReady = false;
        let points = 0;
        let hearts = 5;
        let targetNum = 2;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const eyeCanvas = document.getElementById('ai-eye');
        const eyeCtx = eyeCanvas.getContext('2d');
        let drawing = false;

        async function init() {
            initCanvasSize();
            try {
                model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_v1/model.json');
                isAiReady = true;
                document.getElementById('load-status').innerText = "Sihir Siap! 🪄";
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            } catch (e) {
                console.error("AI Error:", e);
                document.getElementById('load-status').innerText = "Koneksi Terputus. Mohon Refresh Halaman! 📡";
            }
            generateQuestion();
        }

        function initCanvasSize() {
            const size = 300; 
            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, size, size);
            
            // WAJIB HITAM agar kontras AI sempurna
            ctx.strokeStyle = "black";
            ctx.lineWidth = 25; 
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            eyeCtx.fillStyle = "white";
            eyeCtx.fillRect(0,0,28,28);
        }

        function generateQuestion() {
            const n1 = Math.floor(Math.random() * 4) + 1;
            const n2 = Math.floor(Math.random() * 4) + 1;
            targetNum = n1 + n2;
            const icons = ['🍄', '🍃', '🔮', '⭐', '🍎'];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            document.getElementById('quest').innerHTML = `${icon.repeat(n1)} + ${icon.repeat(n2)} = ?`;
            clearBoard();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function move(e) { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function end() { drawing = false; }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
        canvas.addEventListener('touchend', end);

        function clearBoard() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            eyeCtx.fillStyle = "white";
            eyeCtx.fillRect(0,0,28,28);
        }

        // --- ALGORITMA PRE-PROCESSING BARU YANG FLAWLESS ---
        async function recognizeDigit() {
            if (!isAiReady) { alert("Sihir AI belum siap!"); return; }

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imgData.data;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
            let hasContent = false;

            // Cari batas goresan (Bounding Box)
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if (pixels[i] < 100) { // Jika piksel berwarna gelap
                        hasContent = true;
                        if (x < minX) minX = x;
                        if (y < minY) minY = y;
                        if (x > maxX) maxX = x;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            if (!hasContent) { alert("Tulis angka jawabannya dulu ya!"); return; }

            let width = maxX - minX;
            let height = maxY - minY;
            
            // Buat margin pelindung (Square Padding) agar gambar tidak gepeng
            let maxDim = Math.max(width, height);
            let boxSize = Math.max(maxDim * 1.4, 50); 

            // Canvas perantara agar tidak error saat ukuran melebihi batas
            const padCanvas = document.createElement('canvas');
            padCanvas.width = boxSize; padCanvas.height = boxSize;
            const pCtx = padCanvas.getContext('2d');
            pCtx.fillStyle = "white"; pCtx.fillRect(0, 0, boxSize, boxSize);
            
            // Taruh goresan tepat di tengah canvas perantara
            pCtx.drawImage(canvas, minX, minY, width, height, (boxSize - width)/2, (boxSize - height)/2, width, height);

            // Pindahkan ke Mata AI (ukuran 28x28)
            eyeCtx.fillStyle = "white";
            eyeCtx.fillRect(0,0,28,28);
            eyeCtx.drawImage(padCanvas, 0, 0, boxSize, boxSize, 0, 0, 28, 28);

            // Prediksi AI Murni
            const prediction = tf.tidy(() => {
                let tensor = tf.browser.fromPixels(eyeCanvas, 1).toFloat();
                tensor = tf.scalar(255.0).sub(tensor).div(tf.scalar(255.0)); // Balik warna
                return model.predict(tensor.expandDims(0));
            });

            const data = await prediction.data();
            const finalGuess = data.indexOf(Math.max(...data));
            
            processResult(finalGuess);
        }

        function processResult(guess) {
            if (guess === targetNum) {
                points += 10;
                document.getElementById('points').innerText = points;
                alert("WAAAH HEBAT! ✨ Itu benar angka " + guess + "!");
                generateQuestion();
            } else {
                hearts--;
                document.getElementById('hearts').innerText = hearts;
                document.getElementById('canvas-container').classList.add('shake');
                setTimeout(() => document.getElementById('canvas-container').classList.remove('shake'), 400);
                
                if (hearts <= 0) {
                    alert("Energi sihir habis! Ayo coba lagi dari awal.");
                    points = 0; hearts = 5;
                    document.getElementById('points').innerText = points;
                    document.getElementById('hearts').innerText = hearts;
                    generateQuestion();
                } else {
                    // Murni memberitahu AI melihat angka berapa
                    alert(`Tetoot! Jawaban salah.\n\nKamu harusnya menulis angka ${targetNum}, tapi Mata AI membacanya sebagai angka ${guess}. Coba tulis lebih jelas lagi ya!`);
                    clearBoard();
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
